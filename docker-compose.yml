services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-agendamentos}
      POSTGRES_USER: ${DB_USER:-agendamentos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agendamentos}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agendamentos} -d ${DB_NAME:-agendamentos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Sem `ports:` — o banco só é alcançável pela backend-net (isolamento).

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-agendamentos}
      DB_USER: ${DB_USER:-agendamentos}
      DB_PASSWORD: ${DB_PASSWORD:-agendamentos}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    depends_on:
      - backend
    networks:
      - frontend-net
    ports:
      - "3000:3000"
    # NÃO está em backend-net → não enxerga o banco.

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  db_data:
