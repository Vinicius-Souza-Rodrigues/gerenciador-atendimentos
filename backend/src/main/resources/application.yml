spring:
  application:
    name: agendamentos
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:agendamentos}
    username: ${DB_USER:agendamentos}
    password: ${DB_PASSWORD:agendamentos}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:dev-secret-troque-em-producao-0123456789abcdef}
  expiration-seconds: 86400

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:}
    # base usada para montar o deep link compartilhável (t.me/<username>?start=<token>)
    deep-link-base: ${TELEGRAM_DEEP_LINK_BASE:https://t.me}
